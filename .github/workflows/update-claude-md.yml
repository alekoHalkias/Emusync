name: Update CLAUDE.md branch status

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-branch-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark merged branches in CLAUDE.md
        id: update
        env:
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import re, sys, json, os
          from urllib.request import urlopen, Request

          repo = os.environ["REPO"]

          with open("CLAUDE.md", "r") as f:
              content = f.read()

          branches = re.findall(r"`([^`]+)`[^\n]*\(not yet merged[^)]*\)", content)
          if not branches:
              print("No branches annotated as 'not yet merged'.")
              sys.exit(0)

          # Use merged PRs from GitHub API — works for squash, rebase, and merge commits
          page, merged = 1, set()
          while True:
              url = f"https://api.github.com/repos/{repo}/pulls?state=closed&per_page=100&page={page}"
              req = Request(url, headers={"Accept": "application/vnd.github+json"})
              prs = json.loads(urlopen(req).read())
              if not prs:
                  break
              for pr in prs:
                  if pr.get("merged_at"):
                      merged.add(pr["head"]["ref"])
              page += 1

          pattern = r"(`([^`]+)`)([^\n]*)\(not yet merged[^)]*\)"

          def replace(m):
              branch = m.group(2)
              if branch in merged:
                  return f"{m.group(1)}{m.group(3)}(merged into main)"
              return m.group(0)

          new_content = re.sub(pattern, replace, content)

          if new_content == content:
              print("No branch status changes.")
              sys.exit(0)

          with open("CLAUDE.md", "w") as f:
              f.write(new_content)

          print("Updated CLAUDE.md — marked merged branches.")
          EOF

      - name: Commit if changed
        run: |
          if git diff --quiet CLAUDE.md; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git commit -m "ci: mark merged branches in CLAUDE.md"
          git push
